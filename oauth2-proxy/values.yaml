oauth2-proxy:
  # Oauth client configuration specifics
  config:
    # -- OAuth client ID
    clientID: "oauth2-proxy"
  
    # -- custom [oauth2_proxy.cfg](https://github.com/oauth2-proxy/oauth2-proxy/blob/master/contrib/oauth2-proxy.cfg.example) contents for settings not overridable via environment nor command line
    configFile: |-
      email_domains = [ "*" ]
      upstreams = [ "static://200" ]
      # upstreams = [ "http://echo.in.lab" ]
  
    # -- (string)existing Kubernetes configmap to use for the configuration file. See [config template](https://github.com/helm/charts/blob/master/stable/oauth2-proxy/templates/configmap.yaml) for the required values
    existingConfig:
        
  # -- key:value list of extra arguments to give the binary
  extraArgs:
      provider: "oidc"
      # provider: "keycloak"
      # login-url: "https://keycloak.in.lab/auth/realms/basic/protocol/openid-connect/auth"
      # redeem-url: "https://keycloak.in.lab/auth/realms/basic/protocol/openid-connect/token"
      # profile-url: "https://keycloak.in.lab/auth/realms/basic/protocol/openid-connect/userinfo"
      # validate-url: "https://keycloak.in.lab/auth/realms/basic/protocol/openid-connect/userinfo"
      scope: "openid email"
      set-authorization-header: "true"
      pass-authorization-header: "true"
      pass-access-token: "true"
      skip-provider-button: "true"
      cookie-samesite: "lax"
      silence-ping-logging: "true"
      cookie-expire: 5m
      cookie-refresh: 5m
      # pass-basic-auth: "false"
      # skip-jwt-bearer-tokens: "true"
      # set-xauthrequest: "true"
  
  image:
    # -- Image repository
    repository: "quay.io/oauth2-proxy/oauth2-proxy"
    # -- Image tag
    tag: "v7.1.3"
    # -- Image pull policy
    pullPolicy: "IfNotPresent"
