apiVersion: keycloak.org/v1alpha1
kind: KeycloakClient
metadata:
  name: oauth2-proxy
  labels:
    app: keycloak
spec:
  realmSelector:
     matchLabels:
      app: keycloak-basic
  client:
    # auto-generated if not supplied
    #id: 123
    clientId: oauth2-proxy
    secret: clientsecret
    standardFlowEnabled: True
    redirectUris:
      - "https://oauth.in.lab/oauth2/callback"
    optionalClientScopes:
      - email
      - roles
